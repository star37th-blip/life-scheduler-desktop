<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Life Scheduler</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0c0c0c;--sf:#141414;--sf2:#1c1c1c;
  --bd:#252525;--bd2:#333;
  --tx:#c8c8c8;--dim:#777;--mu:#444;--ac:#e8e8e8;
  --red:#ef4444;--green:#6bcb77;
  --tw:52px;
}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;overflow:hidden;}
body{background:var(--bg);color:var(--tx);font-family:'JetBrains Mono',monospace;display:flex;flex-direction:column;height:100vh;}

/* ── HEADER ── */
.hdr{display:flex;align-items:center;justify-content:space-between;padding:9px 16px;background:var(--sf);border-bottom:1px solid var(--bd);flex-shrink:0;gap:10px;}
.dnav{display:flex;align-items:center;gap:8px;}
.nb{background:var(--sf2);border:1px solid var(--bd2);color:var(--dim);padding:5px 10px;cursor:pointer;font-family:'JetBrains Mono',monospace;font-size:11px;transition:.15s;}
.nb:hover{color:var(--ac);border-color:#444;}
.dd{font-family:'Syne',sans-serif;font-size:14px;font-weight:700;color:var(--ac);min-width:155px;text-align:center;}
.tdb{background:none;border:1px solid var(--bd2);color:var(--mu);padding:5px 10px;cursor:pointer;font-family:'JetBrains Mono',monospace;font-size:10px;transition:.15s;}
.tdb:hover{color:var(--ac);border-color:#444;}

/* ── TOOLBAR ── */
.toolbar{display:flex;align-items:center;gap:6px;padding:6px 16px;background:var(--sf);border-bottom:1px solid var(--bd);flex-shrink:0;overflow-x:auto;}
.toolbar::-webkit-scrollbar{height:0;}
.chip{display:flex;align-items:center;gap:5px;padding:3px 9px;border:1px solid var(--bd);font-size:10px;color:var(--dim);white-space:nowrap;transition:.15s;user-select:none;}
.cdot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.cadd{padding:3px 9px;border:1px dashed var(--bd);font-size:10px;color:var(--mu);cursor:pointer;background:none;font-family:'JetBrains Mono',monospace;white-space:nowrap;transition:.15s;}
.cadd:hover{color:var(--dim);border-color:#3a3a3a;}
.spc{flex:1;min-width:8px;}
.cpbtn{padding:3px 9px;border:1px solid var(--bd);font-size:10px;color:var(--mu);cursor:pointer;background:none;font-family:'JetBrains Mono',monospace;white-space:nowrap;transition:.15s;}
.cpbtn:hover{color:var(--dim);}

/* ── MAIN ── */
.main{display:flex;flex:1;overflow:hidden;}

/* ── MARKDOWN PANEL (shared by panel1 & panel3) ── */
.mdpanel{display:flex;flex-direction:column;overflow:hidden;border-right:1px solid var(--bd);flex-shrink:0;}
.mdpanel:last-child{border-right:none;border-left:1px solid var(--bd);}
.panel-hdr{display:flex;align-items:center;justify-content:space-between;padding:6px 12px;background:var(--sf);border-bottom:1px solid var(--bd);flex-shrink:0;}
.panel-title{font-size:9px;font-weight:600;letter-spacing:.15em;color:var(--mu);text-transform:uppercase;}
.edit-btn{padding:2px 8px;font-size:9px;font-family:'JetBrains Mono',monospace;border:1px solid var(--bd2);background:none;color:var(--dim);cursor:pointer;transition:.15s;}
.edit-btn:hover{color:var(--ac);border-color:#444;}
.edit-btn.active{color:var(--green);border-color:#2a4a2a;background:#0a1a0a;}

/* VIEW mode */
.md-view{flex:1;overflow-y:auto;padding:14px 14px;line-height:1.7;}
.md-view::-webkit-scrollbar{width:3px;}
.md-view::-webkit-scrollbar-thumb{background:#252525;}
/* Markdown rendered styles */
.md-view h1{font-family:'Syne',sans-serif;font-size:15px;font-weight:700;color:var(--ac);margin:12px 0 6px;letter-spacing:.02em;}
.md-view h2{font-size:12px;font-weight:600;color:var(--tx);margin:10px 0 5px;letter-spacing:.05em;}
.md-view h3{font-size:11px;font-weight:600;color:var(--dim);margin:8px 0 4px;}
.md-view p{font-size:10.5px;color:var(--dim);margin:4px 0;}
.md-view ul{padding-left:14px;margin:4px 0;}
.md-view li{font-size:10.5px;color:var(--dim);margin:2px 0;list-style:none;position:relative;}
.md-view li::before{content:'—';position:absolute;left:-14px;color:var(--mu);}
.md-view blockquote{border-left:2px solid var(--bd2);padding-left:10px;color:var(--mu);font-size:10px;margin:6px 0;}
.md-view code{background:var(--sf2);padding:1px 5px;border-radius:2px;font-size:9.5px;color:#a8d8a8;}
.md-view strong{color:var(--tx);font-weight:600;}
.md-view em{color:var(--dim);font-style:italic;}
.md-view hr{border:none;border-top:1px solid var(--bd);margin:10px 0;}

/* EDIT mode */
.md-edit{flex:1;overflow-y:auto;padding:12px 14px;font-size:10.5px;line-height:1.8;color:var(--dim);background:var(--bg);border:none;outline:none;resize:none;font-family:'JetBrains Mono',monospace;white-space:pre-wrap;}
.md-edit::-webkit-scrollbar{width:3px;}
.md-edit::-webkit-scrollbar-thumb{background:#252525;}
.md-edit:focus{color:var(--tx);}
.md-edit.hidden,.md-view.hidden{display:none;}

/* ── RESIZER ── */
.rsz{width:8px;flex-shrink:0;background:var(--bd);cursor:col-resize;transition:background .15s;display:flex;align-items:center;justify-content:center;z-index:10;}
.rsz:hover,.rsz.act{background:#3a3a3a;}
.rsz::after{content:'⋮';font-size:12px;color:var(--mu);line-height:1;}

/* ── SCHEDULER ── */
.sched{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:200px;}
.colhdrs{display:grid;grid-template-columns:1fr var(--tw) 1fr;background:var(--sf);border-bottom:1px solid var(--bd2);flex-shrink:0;}
.colhdr{padding:7px 0;font-size:9px;font-weight:600;letter-spacing:.15em;text-transform:uppercase;color:var(--mu);text-align:center;border-right:1px solid var(--bd);}
.colhdr:last-child{border-right:none;}
.gw{flex:1;overflow-y:auto;overflow-x:hidden;position:relative;}
.gw::-webkit-scrollbar{width:4px;}
.gw::-webkit-scrollbar-thumb{background:#252525;border-radius:2px;}
.grid{display:grid;grid-template-columns:1fr var(--tw) 1fr;width:100%;}
.pcol{position:relative;border-right:1px solid var(--bd);cursor:crosshair;}
.tcol{border-right:1px solid var(--bd);background:var(--sf);}
.dcol{position:relative;cursor:crosshair;}
.lines{position:absolute;top:0;left:0;right:0;pointer-events:none;}
.ln{border-bottom:1px solid #181818;}
.ln.hr{border-bottom:1px solid var(--bd);}
.tlabel{display:flex;align-items:center;justify-content:flex-end;padding-right:5px;}
.tlabel.hr{font-size:9px;color:var(--dim);}
.tlabel.mn{font-size:8px;color:var(--mu);}
.blayer{position:absolute;top:0;left:0;right:0;bottom:0;pointer-events:none;}
.blk{position:absolute;left:2px;right:2px;border-radius:3px;display:flex;align-items:center;padding:0 7px;font-size:9px;font-weight:600;color:rgba(255,255,255,.9);overflow:hidden;white-space:nowrap;cursor:pointer;pointer-events:all;z-index:3;transition:filter .12s;}
.blk:hover{filter:brightness(1.2);}
.blk.done{opacity:.35;}
.blk.done::after{content:'✓';margin-left:auto;}
.ghost{position:absolute;left:2px;right:2px;border-radius:3px;pointer-events:none;z-index:2;}
.nowline{position:absolute;left:0;right:0;height:2px;background:var(--red);z-index:10;pointer-events:none;}
.nowline::before{content:'';position:absolute;left:-1px;top:-3px;width:7px;height:7px;background:var(--red);border-radius:50%;}

/* ── STATS ── */
.stats{display:flex;align-items:center;gap:14px;padding:5px 14px;background:var(--sf);border-top:1px solid var(--bd);flex-shrink:0;font-size:10px;color:var(--mu);overflow-x:auto;}
.stats::-webkit-scrollbar{height:0;}
.stitem{display:flex;align-items:center;gap:5px;white-space:nowrap;}
.sv{color:var(--dim);font-weight:600;}
.sdot{width:6px;height:6px;border-radius:50%;}

/* ── MODALS ── */
.ov{position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:200;display:flex;align-items:center;justify-content:center;}
.ov.h{display:none;}
.mo{background:var(--sf);border:1px solid var(--bd2);padding:18px;width:252px;max-height:80vh;overflow-y:auto;}
.mt{font-family:'Syne',sans-serif;font-size:13px;font-weight:700;color:var(--ac);margin-bottom:10px;}
.ti{font-size:10px;color:var(--mu);margin-bottom:12px;padding:5px 8px;background:var(--sf2);border:1px solid var(--bd);}
.al{display:flex;flex-direction:column;gap:5px;margin-bottom:10px;}
.ab{display:flex;align-items:center;gap:10px;padding:8px 10px;background:var(--sf2);border:1px solid var(--bd);cursor:pointer;color:var(--tx);font-family:'JetBrains Mono',monospace;font-size:11px;text-align:left;transition:.15s;width:100%;}
.ab:hover{border-color:#444;background:#222;}
.adc{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
.mr{display:flex;gap:8px;align-items:center;margin-bottom:10px;}
.mi{flex:1;background:var(--sf2);border:1px solid var(--bd);color:var(--tx);padding:6px 9px;font-family:'JetBrains Mono',monospace;font-size:11px;outline:none;}
.mi:focus{border-color:#3a3a3a;}
input[type="color"]{width:32px;height:28px;border:1px solid var(--bd);background:var(--sf2);cursor:pointer;padding:0;}
.ma{display:flex;gap:8px;justify-content:flex-end;margin-top:12px;}
.btn{padding:5px 12px;font-family:'JetBrains Mono',monospace;font-size:10px;cursor:pointer;border:1px solid var(--bd);background:var(--sf2);color:var(--dim);transition:.15s;}
.btn:hover{background:var(--bd);color:var(--tx);}
.btn.p{border-color:#2a4a2a;color:var(--green);}
.btn.p:hover{background:#1a2a1a;}
.btn.d{border-color:#4a1a1a;color:var(--red);}
.btn.d:hover{background:#2a0a0a;}

@media(max-width:768px){
  #panel1,#rsz1,#panel3,#rsz2{display:none;}
}
</style>
</head>

<script>
// ── CONSTANTS ──
const TOTAL=144, CH=22;

// ── STATE ──
let cur=todayStr(), drag=null, pendNew=null, editId=null, editCol=null;
let presets=[];
let acts=[
  {id:'sleep',name:'수면',color:'#7c3aed'},
  {id:'work', name:'근무',color:'#2563eb'},
  {id:'trade',name:'매매',color:'#059669'},
  {id:'exer', name:'운동',color:'#dc2626'},
  {id:'clean',name:'청소',color:'#d97706'},
];
let sched={};

// ── UTILS ──
function todayStr(){const d=new Date();return `${d.getFullYear()}-${p2(d.getMonth()+1)}-${p2(d.getDate())}`;}
function fmtDate(s){const d=new Date(s+'T00:00:00');const dy=['일','월','화','수','목','금','토'];return `${d.getFullYear()}.${p2(d.getMonth()+1)}.${p2(d.getDate())} (${dy[d.getDay()]})`;}
function p2(n){return String(n).padStart(2,'0');}
function shiftDate(s,d){const x=new Date(s+'T00:00:00');x.setDate(x.getDate()+d);return `${x.getFullYear()}-${p2(x.getMonth()+1)}-${p2(x.getDate())}`;}
function cellToTime(c){return `${p2(Math.floor(c/6))}:${p2((c%6)*10)}`;}
function timeToCell(h,m){return h*6+Math.floor(m/10);}
function getAct(id){return acts.find(a=>a.id===id)||{name:'?',color:'#555'};}
function uid(){return Math.random().toString(36).slice(2,9);}
function getDay(date){if(!sched[date])sched[date]={plan:[],do:[]};return sched[date];}

// ── PERSISTENCE ──
function save(){localStorage.setItem('ls_s5',JSON.stringify(sched));localStorage.setItem('ls_a5',JSON.stringify(acts));localStorage.setItem('ls_pre',JSON.stringify(presets));}
function load(){try{const s=localStorage.getItem('ls_s5');if(s)sched=JSON.parse(s);const a=localStorage.getItem('ls_a5');if(a)acts=JSON.parse(a);const p=localStorage.getItem('ls_pre');if(p)presets=JSON.parse(p);}catch(e){}}

// ── MARKDOWN ──
function parseMD(raw) {
  const lines = raw.split('\n');
  let html = '', inUl = false;
  for (let line of lines) {
    // Close list if needed
    if (inUl && !line.match(/^[-*]\s/)) { html += '</ul>'; inUl = false; }
    if      (line.match(/^### /))  html += `<h3>${esc(line.slice(4))}</h3>`;
    else if (line.match(/^## /))   html += `<h2>${esc(line.slice(3))}</h2>`;
    else if (line.match(/^# /))    html += `<h1>${esc(line.slice(2))}</h1>`;
    else if (line.match(/^[-*] /)) { if(!inUl){html+='<ul>';inUl=true;} html+=`<li>${inline(line.slice(2))}</li>`; }
    else if (line.match(/^> /))    html += `<blockquote>${inline(line.slice(2))}</blockquote>`;
    else if (line.match(/^---+$/)) html += '<hr>';
    else if (line.trim()==='')     html += '<br>';
    else                           html += `<p>${inline(line)}</p>`;
  }
  if (inUl) html += '</ul>';
  return html;
}
function inline(s) {
  return esc(s)
    .replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>')
    .replace(/\*(.+?)\*/g,'<em>$1</em>')
    .replace(/`(.+?)`/g,'<code>$1</code>');
}
function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

function saveMD(id) {
  const ta = document.getElementById(id+'Edit');
  // p3 is date-specific, p1 is global
  const key = id==='p3' ? 'md_p3_'+cur : 'md_'+id;
  localStorage.setItem(key, ta.value);
  renderMD(id);
}
function loadMD(id) {
  const key = id==='p3' ? 'md_p3_'+cur : 'md_'+id;
  const v = localStorage.getItem(key);
  const ta = document.getElementById(id+'Edit');
  if (id==='p3') {
    // Default template for new days
    ta.value = v || `# ${fmtDate(cur)} 노트\n\n## 매매\n\n## 기억할것\n\n## 기타\n`;
  } else {
    if (v) ta.value = v;
  }
  renderMD(id);
}
function renderMD(id) {
  const raw = document.getElementById(id+'Edit').value;
  document.getElementById(id+'View').innerHTML = parseMD(raw);
}
function toggleEdit(id) {
  const view = document.getElementById(id+'View');
  const edit = document.getElementById(id+'Edit');
  const btn  = document.getElementById(id+'EditBtn');
  const isEditing = !edit.classList.contains('hidden');
  if (isEditing) {
    // Save & switch to view
    saveMD(id);
    edit.classList.add('hidden');
    view.classList.remove('hidden');
    btn.textContent = '편집';
    btn.classList.remove('active');
  } else {
    // Switch to edit
    view.classList.add('hidden');
    edit.classList.remove('hidden');
    btn.textContent = '완료';
    btn.classList.add('active');
    edit.focus();
  }
}

// ── BUILD GRID ──
function buildGrid(){
  let pl='',dl='',th='';
  for(let i=0;i<TOTAL;i++){
    const isHr=(i%6===5),cls=isHr?' hr':'';
    pl+=`<div class="ln${cls}" style="height:${CH}px"></div>`;
    dl+=`<div class="ln${cls}" style="height:${CH}px"></div>`;
    if(i%6===0) th+=`<div class="tlabel hr" style="height:${CH}px;font-size:9px">${p2(Math.floor(i/6))}:00</div>`;
    else        th+=`<div class="tlabel mn" style="height:${CH}px">${(i%6)*10}</div>`;
  }
  document.getElementById('plines').innerHTML=pl;
  document.getElementById('dlines').innerHTML=dl;
  document.getElementById('tcol').innerHTML=th;
  const h=TOTAL*CH+'px';
  ['pcol','tcol','dcol'].forEach(id=>document.getElementById(id).style.height=h);
  document.getElementById('gridEl').style.height=h;
}

// ── RENDER BLOCKS ──
function renderBlocks(){renderCol('plan');renderCol('do');renderStats();}
function renderCol(col){
  const day=getDay(cur);
  const layer=document.getElementById(col==='plan'?'pblocks':'dblocks');
  layer.innerHTML='';
  day[col].forEach(b=>{
    const act=getAct(b.actId);
    const top=b.start*CH, height=(b.end-b.start+1)*CH-1;
    const div=document.createElement('div');
    div.className='blk'+(b.done?' done':'');
    div.style.cssText=`top:${top}px;height:${height}px;background:${act.color};`;
    if(height>14)div.textContent=act.name;
    div.addEventListener('click',e=>{e.stopPropagation();openEdit(b.id,col);});
    layer.appendChild(div);
  });
}

// ── DRAG ──
function cellFromY(y,colId){
  const rect=document.getElementById(colId).getBoundingClientRect();
  return Math.max(0,Math.min(TOTAL-1,Math.floor((y-rect.top)/CH)));
}
function setupDrag(){
  ['pcol','dcol'].forEach(colId=>{
    const col=colId==='pcol'?'plan':'do';
    const gId=colId==='pcol'?'pghost':'dghost';
    const el=document.getElementById(colId);
    el.addEventListener('mousedown',e=>{
      if(e.target.classList.contains('blk'))return;
      e.preventDefault();
      const c=cellFromY(e.clientY,colId);
      drag={col,colId,gId,start:c,cur:c};
      updateGhost();
    });
    el.addEventListener('mousemove',e=>{
      if(!drag||drag.col!==col)return;
      const c=cellFromY(e.clientY,colId);
      if(c!==drag.cur){drag.cur=c;updateGhost();}
    });
  });
  document.addEventListener('mouseup',()=>{
    if(!drag)return;
    const s=Math.min(drag.start,drag.cur),e=Math.max(drag.start,drag.cur);
    hideGhosts();
    const col=drag.col;drag=null;
    openNewBlockPicker(col,s,e);
  });
}
function updateGhost(){
  if(!drag)return;
  const s=Math.min(drag.start,drag.cur),e=Math.max(drag.start,drag.cur);
  const g=document.getElementById(drag.gId);
  g.style.cssText=`display:block;top:${s*CH}px;height:${(e-s+1)*CH}px;background:rgba(255,255,255,.08);left:2px;right:2px;border-radius:3px;border:2px dashed rgba(255,255,255,.3);`;
}
function hideGhosts(){['pghost','dghost'].forEach(id=>{const g=document.getElementById(id);if(g)g.style.display='none';});}

// ── NEW BLOCK ──
function openNewBlockPicker(col,s,e){
  if(e<s)return;
  pendNew={col,s,e};
  document.getElementById('newBlockInfo').textContent=`${cellToTime(s)} – ${cellToTime(e+1)}  (${(e-s+1)*10}분)`;
  const list=document.getElementById('newBlockList');list.innerHTML='';
  acts.forEach(a=>{
    const btn=document.createElement('button');btn.className='ab';
    btn.innerHTML=`<div class="adc" style="background:${a.color}"></div>${a.name}`;
    btn.onclick=()=>confirmNewBlock(a.id);
    list.appendChild(btn);
  });
  document.getElementById('newBlockOv').classList.remove('h');
}
function confirmNewBlock(actId){
  if(!pendNew)return;
  getDay(cur)[pendNew.col].push({id:uid(),start:pendNew.s,end:pendNew.e,actId,done:false});
  save();renderBlocks();
  document.getElementById('newBlockOv').classList.add('h');pendNew=null;
}
function cancelNewBlock(){pendNew=null;document.getElementById('newBlockOv').classList.add('h');}

// ── EDIT BLOCK ──
function openEdit(bid,col){
  editId=bid;editCol=col;
  const b=getDay(cur)[col].find(x=>x.id===bid);if(!b)return;
  document.getElementById('editInfo').textContent=`${cellToTime(b.start)} – ${cellToTime(b.end+1)}  (${(b.end-b.start+1)*10}분)`;
  const list=document.getElementById('editList');list.innerHTML='';
  const dBtn=document.createElement('button');dBtn.className='ab';
  dBtn.innerHTML=b.done?`<div class="adc" style="background:#555"></div>완료 취소`:`<div class="adc" style="background:var(--green)"></div>완료 표시`;
  dBtn.onclick=()=>{const bx=getDay(cur)[col].find(x=>x.id===bid);if(bx){bx.done=!bx.done;save();renderBlocks();}closeEdit();};
  list.appendChild(dBtn);
  acts.forEach(a=>{
    const btn=document.createElement('button');btn.className='ab';
    btn.innerHTML=`<div class="adc" style="background:${a.color}"></div>${a.name}`;
    btn.onclick=()=>{const bx=getDay(cur)[col].find(x=>x.id===bid);if(bx){bx.actId=a.id;save();renderBlocks();}closeEdit();};
    list.appendChild(btn);
  });
  document.getElementById('editOv').classList.remove('h');
}
function deleteBlock(){
  if(!editId||!editCol)return;
  const day=getDay(cur);day[editCol]=day[editCol].filter(x=>x.id!==editId);
  save();renderBlocks();closeEdit();
}
function closeEdit(){document.getElementById('editOv').classList.add('h');editId=null;editCol=null;}

// ── TOOLBAR ──
function renderToolbar(){
  const tb=document.getElementById('toolbar');
  tb.querySelectorAll('.chip,.cadd,.preset-chip,.preset-save,.preset-divider').forEach(e=>e.remove());
  const sp=tb.querySelector('.spc');
  // Activity chips
  acts.forEach(a=>{
    const c=document.createElement('div');c.className='chip';
    c.innerHTML=`<div class="cdot" style="background:${a.color}"></div>${a.name}`;
    tb.insertBefore(c,sp);
  });
  const add=document.createElement('button');add.className='cadd';add.textContent='+ 활동';add.onclick=openAddAct;
  tb.insertBefore(add,sp);
  // Divider
  if(presets.length>0||true){
    const div=document.createElement('div');div.className='preset-divider';
    div.style.cssText='width:1px;height:16px;background:var(--bd2);flex-shrink:0;';
    tb.insertBefore(div,sp);
  }
  // Preset chips
  presets.forEach(p=>{
    const c=document.createElement('div');c.className='preset-chip';
    c.style.cssText='display:flex;align-items:center;gap:5px;padding:3px 9px;border:1px solid var(--bd2);font-size:10px;color:var(--dim);white-space:nowrap;cursor:pointer;transition:.15s;';
    c.innerHTML=`<span style="color:var(--mu);font-size:9px">▶</span>${p.name}`;
    c.onmouseenter=()=>{c.style.color='var(--tx)';c.style.borderColor='#444';};
    c.onmouseleave=()=>{c.style.color='var(--dim)';c.style.borderColor='var(--bd2)';};
    c.onclick=()=>applyPreset(p);
    tb.insertBefore(c,sp);
  });
  // Save preset button
  const sBtn=document.createElement('button');sBtn.className='preset-save cpbtn';
  sBtn.textContent='프리셋 저장';sBtn.onclick=openSavePreset;
  tb.insertBefore(sBtn,sp);
}

// ── PRESETS ──
function openSavePreset(){
  const day=getDay(cur);
  if(!day.plan.length){alert('저장할 PLAN 블록이 없습니다.');return;}
  document.getElementById('presetName').value='';
  document.getElementById('presetOv').classList.remove('h');
  setTimeout(()=>document.getElementById('presetName').focus(),50);
}
function confirmSavePreset(){
  const name=document.getElementById('presetName').value.trim();
  if(!name)return;
  const day=getDay(cur);
  presets.push({id:uid(),name,blocks:day.plan.map(b=>({start:b.start,end:b.end,actId:b.actId}))});
  save();renderToolbar();
  document.getElementById('presetOv').classList.add('h');
}
function closeSavePreset(){document.getElementById('presetOv').classList.add('h');}

function applyPreset(p){
  if(!confirm(`"${p.name}" 프리셋을 ${fmtDate(cur)}에 적용하겠습니까?`))return;
  const day=getDay(cur);
  day.plan=p.blocks.map(b=>({...b,id:uid(),done:false}));
  save();renderBlocks();
}
function openAddAct(){document.getElementById('an').value='';document.getElementById('ac').value='#6366f1';document.getElementById('addActOv').classList.remove('h');setTimeout(()=>document.getElementById('an').focus(),50);}
function closeAddAct(){document.getElementById('addActOv').classList.add('h');}
function confirmAddAct(){const n=document.getElementById('an').value.trim();const c=document.getElementById('ac').value;if(!n)return;acts.push({id:uid(),name:n,color:c});save();renderToolbar();closeAddAct();}

// ── DATE NAV ──
function shiftDay(d){cur=shiftDate(cur,d);renderDate();renderBlocks();loadMD('p3');}
function goToday(){cur=todayStr();renderDate();renderBlocks();loadMD('p3');scrollToNow();}
function renderDate(){document.getElementById('dd').textContent=fmtDate(cur);}

// ── COPY YESTERDAY ──
function copyYesterday(){
  const prev=shiftDate(cur,-1);const src=getDay(prev);
  if(!src.plan.length){alert('전일 PLAN 없음');return;}
  getDay(cur).plan=src.plan.map(b=>({...b,id:uid(),done:false}));
  save();renderBlocks();
}

// ── NOW LINE ──
function updateNow(){
  const line=document.getElementById('nowline');
  if(cur!==todayStr()){line.style.display='none';return;}
  const now=new Date();
  line.style.top=(now.getHours()*6*CH+(now.getMinutes()/10)*CH)+'px';
  line.style.display='block';
}
function scrollToNow(){
  if(cur!==todayStr())return;
  document.getElementById('gw').scrollTop=Math.max(0,new Date().getHours()*6*CH-160);
}

// ── STATS ──
function renderStats(){
  const day=getDay(cur);const tot={};
  [...day.plan,...day.do].forEach(b=>{tot[b.actId]=(tot[b.actId]||0)+(b.end-b.start+1);});
  let html='';
  Object.entries(tot).forEach(([id,cnt])=>{
    const ac=getAct(id);const mins=cnt*10;const h=Math.floor(mins/60),m=mins%60;
    html+=`<div class="stitem"><div class="sdot" style="background:${ac.color}"></div>${ac.name} <span class="sv">${h>0?h+'h':''}${m>0?m+'m':''}</span></div>`;
  });
  const mk=cur.slice(0,7);let mM=0;
  Object.entries(sched).forEach(([date,d])=>{if(date.startsWith(mk))d.plan.forEach(b=>{if(b.actId==='work')mM+=(b.end-b.start+1)*10;});});
  const mh=Math.floor(mM/60),mm=mM%60;
  html+=`<span style="margin-left:auto;white-space:nowrap">이달 근무 <span class="sv">${mh}h${mm>0?mm+'m':''}</span></span>`;
  document.getElementById('stats').innerHTML=html||'<span style="color:var(--mu);font-size:10px">PLAN 컬럼을 드래그하세요</span>';
}

// ── RESIZERS ──
function setupResizer(rszId, targetId, side) {
  // side: 'left' = resizing panel to left of resizer, 'right' = panel to right
  const rsz = document.getElementById(rszId);
  const panel = document.getElementById(targetId);
  let d=false, sx=0, sw=0;
  rsz.addEventListener('mousedown', e=>{
    d=true; sx=e.clientX; sw=panel.offsetWidth;
    rsz.classList.add('act');
    document.body.style.cssText='cursor:col-resize;user-select:none';
  });
  document.addEventListener('mousemove', e=>{
    if(!d)return;
    const delta = side==='left' ? e.clientX-sx : sx-e.clientX;
    const newW = Math.max(150, sw+delta);
    panel.style.width=newW+'px';
  });
  document.addEventListener('mouseup', ()=>{
    if(!d)return; d=false;
    rsz.classList.remove('act');
    document.body.style.cssText='';
  });
}

// ── INIT ──
function init(){
  load();buildGrid();renderDate();renderToolbar();renderBlocks();
  loadMD('p1');loadMD('p3');
  setupDrag();
  setupResizer('rsz1','panel1','left');
  setupResizer('rsz2','panel3','right');
  updateNow();scrollToNow();
  setInterval(updateNow,60000);
  ['presetOv','newBlockOv','editOv','addActOv'].forEach(id=>{
    document.getElementById(id).addEventListener('click',e=>{
      if(e.target!==e.currentTarget)return;
      if(id==='presetOv')closeSavePreset();
      else if(id==='newBlockOv')cancelNewBlock();
      else if(id==='editOv')closeEdit();
      else closeAddAct();
    });
  });
  document.addEventListener('keydown',e=>{
    if(e.key==='Escape'){closeSavePreset();cancelNewBlock();closeEdit();closeAddAct();}
  });
}
document.addEventListener('DOMContentLoaded',init);
</script>
